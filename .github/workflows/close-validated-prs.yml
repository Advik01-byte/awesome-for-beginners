name: Close Validated PRs

on:
  workflow_run:
    workflows: ["Validate Exercise Submissions"]
    types: [completed]

permissions:
  pull-requests: write
  issues: write

jobs:
  process-results:
    runs-on: ubuntu-latest
    steps:
      - name: Get PR information
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            
            // Get the workflow run that triggered this
            const workflowRun = context.payload.workflow_run;
            console.log(`Workflow run: ${workflowRun.id}`);
            console.log(`Status: ${workflowRun.status}`);
            console.log(`Conclusion: ${workflowRun.conclusion}`);
            
            // Find associated PR
            const prs = await github.rest.pulls.list({
              owner: owner,
              repo: repo,
              state: 'open',
              per_page: 100
            });
            
            console.log(`Checking ${prs.data.length} open PRs...`);
            
            for (const pr of prs.data) {
              if (pr.head.sha === workflowRun.head_sha) {
                console.log(`Found PR: #${pr.number}`);
                
                // Check if already commented
                const comments = await github.rest.issues.listComments({
                  owner: owner,
                  repo: repo,
                  issue_number: pr.number
                });
                
                const hasComment = comments.data.some(c => 
                  c.body.includes('Validation') || c.body.includes('✅') || c.body.includes('❌')
                );
                
                if (workflowRun.conclusion === 'success') {
                  console.log(`✅ Validation PASSED for PR #${pr.number}`);
                  
                  if (!hasComment) {
                    await github.rest.issues.createComment({
                      owner: owner,
                      repo: repo,
                      issue_number: pr.number,
                      body: '✅ **Excellent Work!** All exercises have been validated successfully!\n\nYour submission is correct. Closing this PR now.'
                    });
                  }
                  
                  await github.rest.pulls.update({
                    owner: owner,
                    repo: repo,
                    pull_number: pr.number,
                    state: 'closed'
                  });
                  
                  console.log(`✅ Closed PR #${pr.number}`);
                } 
                else if (workflowRun.conclusion === 'failure') {
                  console.log(`❌ Validation FAILED for PR #${pr.number}`);
                  
                  if (!hasComment) {
                    await github.rest.issues.createComment({
                      owner: owner,
                      repo: repo,
                      issue_number: pr.number,
                      body: '❌ **Validation Failed**\n\nPlease fix the errors shown in the workflow run and push again. The workflow will automatically re-validate.\n\n**What to check:**\n- HTML: Proper tags and structure\n- CSS: Valid syntax\n- JavaScript: No syntax errors\n- Java/C++: Compile successfully and remove TODO comments'
                    });
                  }
                  
                  console.log(`Added comment to PR #${pr.number}`);
                }
              }
            }
