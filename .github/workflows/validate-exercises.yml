name: Validate Exercise Submissions

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Get changed files
        id: changed_files
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Changed files: $CHANGED_FILES"

      - name: Setup environments
        run: |
          sudo apt-get update
          sudo apt-get install -y g++

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Validate changed files
        id: validate
        run: |
          VALIDATION_FAILED=0
          
          CHANGED_FILES="${{ steps.changed_files.outputs.files }}"
          
          # Only validate exercise files that were changed
          echo "=== Validating Changed Files ==="
          
          while IFS= read -r file; do
            if [ -z "$file" ]; then
              continue
            fi
            
            echo "Checking: $file"
            
            # Validate HTML files
            if [[ $file == *.html ]]; then
              if ! grep -q "<!DOCTYPE" "$file" 2>/dev/null; then
                echo "❌ Missing DOCTYPE in $file"
                VALIDATION_FAILED=1
              fi
              if ! grep -q "</html>" "$file" 2>/dev/null; then
                echo "❌ Missing closing </html> tag in $file"
                VALIDATION_FAILED=1
              fi
            fi
            
            # Validate CSS files
            if [[ $file == *.css ]]; then
              if grep -q "colour:" "$file" 2>/dev/null; then
                echo "❌ Found typo 'colour:' in $file (should be 'color:')"
                VALIDATION_FAILED=1
              fi
            fi
            
            # Validate JavaScript files
            if [[ $file == *.js ]]; then
              if ! node -c "$file" 2>/dev/null; then
                echo "❌ Syntax error in $file"
                VALIDATION_FAILED=1
              fi
            fi
            
            # Validate Java files
            if [[ $file == *.java ]]; then
              if grep -q "TODO" "$file" 2>/dev/null; then
                echo "❌ Found TODO comment in $file (incomplete)"
                VALIDATION_FAILED=1
              fi
              if ! javac "$file" 2>/dev/null; then
                echo "❌ Compilation error in $file"
                VALIDATION_FAILED=1
              fi
            fi
            
            # Validate C++ files
            if [[ $file == *.cpp ]]; then
              if grep -q "TODO" "$file" 2>/dev/null; then
                echo "❌ Found TODO comment in $file (incomplete)"
                VALIDATION_FAILED=1
              fi
              if ! g++ -c "$file" -o /tmp/test.o 2>/dev/null; then
                echo "❌ Compilation error in $file"
                VALIDATION_FAILED=1
              fi
            fi
            
          done <<< "$CHANGED_FILES"
          
          if [ $VALIDATION_FAILED -eq 0 ]; then
            echo "VALIDATION_RESULT=PASS" >> $GITHUB_OUTPUT
            echo "✅ All changed files validated successfully!"
            exit 0
          else
            echo "VALIDATION_RESULT=FAIL" >> $GITHUB_OUTPUT
            echo "❌ Validation failed for changed files!"
            exit 1
          fi

      - name: Set PR Status
        if: always()
        run: |
          if [ "${{ steps.validate.outputs.VALIDATION_RESULT }}" = "PASS" ]; then
            echo "✅ PASS - All validations passed"
            exit 0
          else
            echo "❌ FAIL - Some validations failed"
            exit 1
          fi
