name: Validate Exercise Submissions

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Get changed files
        id: changed_files
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Changed files:"
          echo "$CHANGED_FILES"

      - name: Setup environments
        run: |
          sudo apt-get update
          sudo apt-get install -y g++
          npm install -g htmlhint
          npm install -g stylelint stylelint-config-standard

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Validate changed files
        id: validate
        run: |
          VALIDATION_FAILED=0
          
          CHANGED_FILES="${{ steps.changed_files.outputs.files }}"
          
          echo "=== Validating Changed Files ==="
          
          while IFS= read -r file; do
            if [ -z "$file" ] || [ ! -f "$file" ]; then
              continue
            fi
            
            echo ""
            echo "Checking: $file"
            
            # Validate HTML files
            if [[ $file == *.html ]]; then
              echo "Running HTMLHint..."
              if ! htmlhint "$file" 2>&1; then
                echo "❌ HTML validation failed for $file"
                VALIDATION_FAILED=1
              else
                echo "✅ HTML is valid"
              fi
            fi
            
            # Validate CSS files
            if [[ $file == *.css ]]; then
              echo "Running StyleLint..."
              if ! npx stylelint "$file" 2>&1; then
                echo "❌ CSS validation failed for $file"
                VALIDATION_FAILED=1
              else
                echo "✅ CSS is valid"
              fi
              
              # Also check for common typos
              if grep -q "colour:" "$file" 2>/dev/null; then
                echo "❌ Found typo 'colour:' in $file (should be 'color:')"
                VALIDATION_FAILED=1
              fi
            fi
            
            # Validate JavaScript files
            if [[ $file == *.js ]]; then
              echo "Checking JavaScript syntax..."
              if ! node -c "$file" 2>/dev/null; then
                echo "❌ Syntax error in $file"
                VALIDATION_FAILED=1
              else
                echo "✅ JavaScript syntax is valid"
              fi
            fi
            
            # Validate Java files
            if [[ $file == *.java ]]; then
              echo "Checking Java..."
              if grep -q "TODO" "$file" 2>/dev/null; then
                echo "❌ Found TODO comment in $file (incomplete - remove TODO comments)"
                VALIDATION_FAILED=1
              fi
              if ! javac "$file" 2>/dev/null; then
                echo "❌ Java compilation error in $file"
                VALIDATION_FAILED=1
              else
                echo "✅ Java compiles successfully"
              fi
            fi
            
            # Validate C++ files
            if [[ $file == *.cpp ]]; then
              echo "Checking C++..."
              if grep -q "TODO" "$file" 2>/dev/null; then
                echo "❌ Found TODO comment in $file (incomplete - remove TODO comments)"
                VALIDATION_FAILED=1
              fi
              if ! g++ -c "$file" -o /tmp/test.o 2>/dev/null; then
                echo "❌ C++ compilation error in $file"
                VALIDATION_FAILED=1
              else
                echo "✅ C++ compiles successfully"
              fi
            fi
            
          done <<< "$CHANGED_FILES"
          
          echo ""
          echo "================================"
          if [ $VALIDATION_FAILED -eq 0 ]; then
            echo "✅ ALL VALIDATIONS PASSED"
            echo "VALIDATION_RESULT=PASS" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "❌ VALIDATION FAILED"
            echo "VALIDATION_RESULT=FAIL" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Final Result
        if: always()
        run: |
          echo "Final Validation Result: ${{ steps.validate.outputs.VALIDATION_RESULT }}"
