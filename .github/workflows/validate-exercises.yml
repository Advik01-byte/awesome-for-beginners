name: Validate Exercise Submissions

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Get changed files
        id: changed_files
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(html|css|js|py|java|cpp)$' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "=== Changed Files ==="
          echo "$CHANGED_FILES"

      - name: Setup environments
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ python3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Run comprehensive validation
        id: validate
        run: |
          VALIDATION_FAILED=0
          CHANGED_FILES="${{ steps.changed_files.outputs.files }}"
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "❌ No exercise files changed"
            echo "VALIDATION_RESULT=FAIL" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "=== Starting Validation ===" 
          
          while IFS= read -r file; do
            if [ -z "$file" ] || [ ! -f "$file" ]; then
              continue
            fi
            
            echo ""
            echo "Validating: $file"
            
            # Run test
            if node .github/test-exercises/test-all.js "$file" > /tmp/test-output.txt 2>&1; then
              echo "✅ PASSED"
            else
              echo "❌ FAILED"
              cat /tmp/test-output.txt
              VALIDATION_FAILED=1
            fi
          done <<< "$CHANGED_FILES"
          
          echo ""
          if [ $VALIDATION_FAILED -eq 0 ]; then
            echo "✅ ALL VALIDATIONS PASSED"
            echo "VALIDATION_RESULT=PASS" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "❌ SOME VALIDATIONS FAILED"
            echo "VALIDATION_RESULT=FAIL" >> $GITHUB_OUTPUT
            exit 1
          fi
